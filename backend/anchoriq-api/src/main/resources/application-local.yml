server:
  port: 8082

spring:
  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5433/anchoriq
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 3000
      idle-timeout: 600000

  # Neo4j
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: ${NEO4J_USERNAME}
      password: ${NEO4J_PASSWORD}
    pool:
      max-connection-pool-size: 30

  # Redis
  data:
    redis:
      host: localhost
      port: 6380
      password: ${REDIS_PASSWORD}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  # Elasticsearch - local에서는 미기동 가능하므로 auto-configuration 비활성화
  elasticsearch:
    uris: http://localhost:9200

  # Kafka - local에서는 미기동 가능하므로 fail-fast 비활성화 및 auto-configuration 제외
  kafka:
    bootstrap-servers: localhost:29092
    admin:
      fail-fast: false
    listener:
      concurrency: 3

  # Elasticsearch auto-configuration 비활성화 (local에서 미기동 시 앱 기동 실패 방지)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration

  # JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# Logging (local = debug)
logging:
  level:
    com.anchoriq: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
